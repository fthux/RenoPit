server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback - all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy to backend
    location /api/ {
        # FastAPI collection routes end with "/"; rewrite bare /api/projects → /api/projects/
        # to avoid 307 Temporary Redirect (which breaks CORS when Location includes backend port)
        rewrite ^/api/projects$ /api/projects/ last;

        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support for analysis progress
        proxy_set_header Connection "";
        proxy_read_timeout 3600s;
        proxy_buffering off;
        chunked_transfer_encoding on;
    }

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;
}